  <script>
    const video = document.getElementById("myVideo");
    const btn = document.getElementById("myBtn");
    const bannerWrapper = document.getElementById("bannerWrapper");
    const countSelectTop = document.getElementById("countSelectTop");
    const countSelectBottom = document.getElementById("countSelectBottom");

    function toggleVideo() {
      if (video.paused) {
        video.play();
        btn.innerHTML = "Pause Background";
      } else {
        video.pause();
        btn.innerHTML = "Play Background";
      }
    }

    function renderBanners(count) {
      bannerWrapper.innerHTML = "";
      for (let i = 0; i < count; i++) {
        const bannerDiv = document.createElement("div");
        bannerDiv.className = "banner";

        const script = document.createElement("script");
        script.src = "https://eeecurrency.com/cgi-bin/bannerrotate.cgi?cachebuster=" + Date.now() + "_" + i;
        script.async = true;

        bannerDiv.appendChild(script);
        bannerWrapper.appendChild(bannerDiv);
      }
    }

    function syncBannerCount(value) {
      countSelectTop.value = value;
      countSelectBottom.value = value;
      renderBanners(parseInt(value, 10));
    }

    countSelectTop.addEventListener("change", function() {
      syncBannerCount(this.value);
    });

    countSelectBottom.addEventListener("change", function() {
      syncBannerCount(this.value);
    });

    (function setCopyright() {
      const startYear = 2013;
      const currentYear = new Date().getFullYear();
      document.getElementById("copyrightYear").textContent =
        startYear === currentYear ? String(currentYear) : startYear + " - " + currentYear;
    })();

    syncBannerCount("10");
  </script>
